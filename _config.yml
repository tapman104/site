# _config.yml
title: "ArticLE / Blog"
description: "High-performance insights on web dev, SEO, and agentic AI."
author: "Your Name"
email: "your@email.com"
google_site_verification: "hEM99FnrKpLvJ_vU8h9GIPMOz6j8XxL0iSfQgmtpLAw"
baseurl: "/site"                # Based on your deployment URL
url: "https://tapman104.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /articles/:title/   # Clean URLs: /articles/my-post/

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# Pagination
paginate: 5
paginate_path: "/page/:num/"

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Your Name"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .sass-cache/
  - .jekyll-cache/
  - vendor/
  - node_modules/
